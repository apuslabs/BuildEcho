name: BuildEcho Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: node dist/src/cli.js daily
