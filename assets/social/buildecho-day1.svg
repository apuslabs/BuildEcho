
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="45%" stop-color="#0f2330"/>
      <stop offset="100%" stop-color="#162719"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Menlo, Consolas, monospace; }
      .title { font-size: 78px; font-weight: 820; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font-size: 34px; font-weight: 560; fill: #cbd5e1; }
      .small { font-size: 25px; fill: #9fb0c5; }
      .chip { font-size: 27px; font-weight: 650; fill: #e2e8f0; }
      .cardTitle { font-size: 32px; font-weight: 760; fill: #f8fafc; }
      .cardBody { font-size: 25px; fill: #cbd5e1; }
      .node { font-size: 29px; font-weight: 760; fill: #07111f; }
      .arrow { font-size: 44px; font-weight: 700; fill: #94a3b8; }
      .footer { font-size: 25px; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.25">
    <circle cx="1350" cy="110" r="250" fill="#0ea5e9" opacity="0.22"/>
    <circle cx="1180" cy="770" r="290" fill="#22c55e" opacity="0.16"/>
    <circle cx="210" cy="760" r="260" fill="#f59e0b" opacity="0.11"/>
  </g>
  <g opacity="0.18" stroke="#94a3b8" stroke-width="1">
    <path d="M82 160 H1518"/>
    <path d="M82 740 H1518"/>
    <path d="M230 70 V820"/>
    <path d="M1370 70 V820"/>
  </g>

  <g transform="translate(92 76)">
    <rect x="0" y="0" width="318" height="54" rx="27" fill="#0f172a" stroke="#334155"/>
    <circle cx="30" cy="27" r="9" fill="#34d399"/>
    <text class="sans chip" x="52" y="36">Day 1 feature</text>
  </g>

  <text class="sans title" x="92" y="195">BuildEcho reads git now</text>
  <rect x="92" y="218" width="670" height="8" rx="4" fill="url(#accent)"/>
  <text class="sans subtitle" x="92" y="292">Real commits become a public-building log</text>
  <text class="sans small" x="92" y="340">No hype. No fake progress. Just commit history turned into proof, drafts, and next steps.</text>

  <g transform="translate(92 430)" filter="url(#softShadow)">
    <rect x="0" y="0" width="420" height="190" rx="28" fill="#0f172a" stroke="#334155"/>
    <text class="mono cardTitle" x="34" y="56">git log</text>
    <text class="sans cardBody" x="34" y="104">recent commits</text>
    <text class="sans cardBody" x="34" y="140">changed files</text>
    <text class="sans cardBody" x="34" y="176">diff stats</text>
  </g>

  <text class="sans arrow" x="545" y="548">→</text>

  <g transform="translate(610 430)" filter="url(#softShadow)">
    <rect x="0" y="0" width="420" height="190" rx="28" fill="#f8fafc"/>
    <text class="sans node" x="34" y="57">Build log</text>
    <text class="sans cardBody" x="34" y="105" fill="#475569">public angle</text>
    <text class="sans cardBody" x="34" y="141" fill="#475569">proof list</text>
    <text class="sans cardBody" x="34" y="177" fill="#475569">quality checklist</text>
  </g>

  <text class="sans arrow" x="1064" y="548">→</text>

  <g transform="translate(1128 430)" filter="url(#softShadow)">
    <rect x="0" y="0" width="380" height="190" rx="28" fill="#0f172a" stroke="#334155"/>
    <text class="sans cardTitle" x="34" y="57">Drafts</text>
    <text class="sans cardBody" x="34" y="105">X / LinkedIn</text>
    <text class="sans cardBody" x="34" y="141">Reddit / HN</text>
    <text class="sans cardBody" x="34" y="177">Discord</text>
  </g>

  <g transform="translate(92 692)">
    <rect x="0" y="0" width="760" height="82" rx="22" fill="#0f172a" stroke="#334155"/>
    <text class="sans footer" x="32" y="34">commit → proof → public update → feedback → next build step</text>
    <text class="sans small" x="32" y="64">Agent-driven. Human-approved.</text>
  </g>

  <g transform="translate(974 692)">
    <rect x="0" y="0" width="534" height="82" rx="22" fill="#0f172a" stroke="#334155"/>
    <text class="mono small" x="32" y="35">github.com/apuslabs/BuildEcho</text>
    <text class="sans small" x="32" y="64">Contributions welcome</text>
  </g>
</svg>